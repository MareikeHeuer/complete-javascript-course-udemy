A HIGH LEVEL OVERVIEW OF JAVASCRIPT

JavaScript — High-Level Overview (Study Notes)
1. Definition

High-level
Prototype-based
Object-oriented
Multi-paradigm
Interpreted / Just-in-time compiled
Dynamic (dynamically typed)
Single-threaded
Garbage-collected
First-class functions
Non-blocking event loop concurrency model

2. High-Level Language

- Does not require manual memory or CPU management
- Uses abstractions to simplify development
- Easier to learn and use than low-level languages (e.g., C)
- Trade-off: less performance optimization than low-level languages

3. Garbage Collection

- Automatic memory management by the JavaScript engine
- Removes unused objects from memory
- Prevents memory leaks
- Developers do not manually free memory

4. Interpreted / Just-in-Time Compiled

- All programs must be converted to machine code (0s and 1s)
- JavaScript code is human-readable abstraction
- Translation happens inside the JavaScript engine
- Uses interpretation and/or JIT compilation

5. Multi-Paradigm Language

- Supports multiple programming paradigms:

Procedural programming
- Linear code execution
- Functions for organization

Object-Oriented Programming (OOP)
- Code structured around objects

Functional Programming (FP)
- Functions as core units
- Can be imperative or declarative

Developer chooses paradigm(s)

6. Prototype-Based Object-Oriented Programming
- Almost everything is an object
- Exceptions: primitive values (numbers, strings, booleans, etc.)
- Objects are created from prototypes (blueprints)
- Objects inherit methods from their prototype
- Example: arrays inherit methods like .push()
- Uses prototypal inheritance

7. First-Class Functions
- Functions are treated like variables

Functions can:
- Be stored in variables
- Be passed as arguments
- Be returned from other functions

Enables functional programming techniques
- Used in callbacks (e.g., event listeners)

8. Dynamic Typing
- No explicit data types assigned to variables
- Types determined at runtime
- Variable types can change during execution

Contrast:
- Statically typed languages require explicit types

Optional alternative: TypeScript (adds static typing)

9. Single-Threaded & Event Loop
- JavaScript runs on a single thread
- Can only execute one task at a time
- Concurrency handled via the event loop

Long-running tasks:
- Executed in the background
- Returned to the main thread when complete
- Enables non-blocking behavior

10. Concurrency Model
- Describes how JavaScript handles multiple tasks

Uses:
- Single thread
- Non-blocking event loop

Prevents blocking during tasks like:
- Data fetching
- Timers

Core concept for asynchronous JavaScript

THE JAVASCRIPT ENGINE AND RUNTIME

1. JavaScript Engine

- Definition: A program that executes JavaScript code
- Every browser has its own engine

Example:
- Google Chrome → V8 engine
- Node.js → also uses V8

2. Core Components of the Engine

Call Stack
- Where JavaScript code is executed
- Uses execution contexts
- Runs on a single main thread

Heap
- Unstructured memory pool
- Stores objects and data needed by the application

3. Compilation vs Interpretation

Compilation
- Entire source code converted to machine code at once
- Machine code stored in a portable file
- Execution happens after compilation
- Faster performance

Interpretation
- Code executed line by line
- Translation to machine code happens right before execution
- No separate compilation step
- Slower than compiled languages

4. Just-In-Time (JIT) Compilation

- Modern JavaScript uses JIT compilation
- Mix of compilation and interpretation

Process:
- Entire code compiled into machine code
- Executed immediately
- No portable file created
- Much faster than pure interpretation
- Required for modern web apps performance

5. How JavaScript Code Runs (Inside the Engine)

Step 1: Parsing
- Engine reads the source code
- Converts it into an Abstract Syntax Tree (AST)
- Breaks code into meaningful pieces (keywords, variables, etc.)
- Checks for syntax errors
- AST is NOT related to the DOM

Step 2: Compilation
- AST converted into machine code
- Done using JIT compilation
- Machine code executed immediately
- Execution happens in the call stack

6. Engine Optimization

- Engine first creates unoptimized machine code
- Starts execution immediately

In background:
- Code is optimized
- Recompiled with better performance
- Optimized code replaces unoptimized code
- Happens without stopping execution
- Optimization runs in special internal threads (not accessible to developers)

7. What is a Runtime?

A container that includes:
- JavaScript engine
- Additional features needed to run JavaScript
- Engine alone is not enough

Runtime = Engine + Extra APIs + Event System

8. Browser Runtime Structure
Includes:

1. JavaScript Engine
- Call stack
- Heap

2. Web APIs
Provided by the browser (not JavaScript itself)

Examples:
- DOM
- Timers (setTimeout)
- console.log

Accessible through the global window object

3. Callback Queue
- Data structure storing callback functions
- Holds functions ready to execute

Example:
- Event handlers
- Timer callbacks

4. Event Loop
Monitors call stack and callback queue

If call stack is empty:
- Moves callback from queue to stack
- Enables non-blocking behavior
- Core part of JavaScript concurrency model

9. How Event Handling Works

- Event occurs (e.g., button click)
- Callback function placed in callback queue

If call stack is empty:
- Event loop moves callback to call stack
- Callback function executes

10. Node.js Runtime
Similar structure to browser runtime

Differences:
- No Web APIs (no browser)
- Uses C++ bindings
- Includes a thread pool
- Shows JavaScript can run outside the browser

Big Picture Summary
Engine
- Executes JavaScript

Contains:
- Call stack
- Heap

Uses:
- Parsing → AST
- JIT compilation
- Background optimization
- Runtime
- Engine + APIs + Event Loop

Browser runtime includes:
- Web APIs
- Callback queue
- Event loop

Enables asynchronous, non-blocking JavaScrip

EXECUTION CONTEXTS AND THE CALL STACK 

1. How JavaScript Code Executes
- JavaScript code runs inside the JavaScript engine
- Execution happens in the call stack

Before execution:
- Code is compiled
- Then execution begins

2. Global Execution Context
- Created when JavaScript starts running
- Executes top-level code

Top-Level Code
- Code not inside any function
- Runs immediately when the program starts

Key Rule
- There is only one global execution context in a program

Functions
- Functions are declared during top-level execution
- Code inside functions runs only when the function is called

3. Execution Context
- Environment where JavaScript code runs
- Contains all information needed to execute code

Characteristics
- JavaScript code always runs inside an execution context

Created for:
- Global code
- Each function call

4. Types of Execution Contexts

Global Execution Context
- Created automatically
- Runs top-level code
- Exists for the lifetime of the program

Function Execution Context
- Created every time a function is called
- Each function call gets its own context

Method Execution Context
- Methods are functions attached to objects
- Also create execution contexts

5. Execution Context Components
Each execution context contains three main parts.

1. Variable Environment
Stores:
- Variables
- Function declarations
- Array-like object
- Arguments object
Contains arguments passed into a function

Example:

function test(a, b) {}
test(7, 9)

Arguments object:

[7, 9]

2. Scope Chain
- Provides access to variables outside the current function
- Links execution contexts together
- Enables variable lookup in outer scopes

Example concept:

function outer() {
   let a = 10
   function inner() {
       console.log(a)
   }
}

inner() can access a because of the scope chain.

3. this Keyword
- Special variable in each execution context
- Refers to the object calling the function
- Value determined at runtime

6. Creation Phase
Before execution begins:
- Execution context is created and initialized.

During creation phase:
- Variables are registered
- Functions are stored
- Scope chain is established
- this keyword is determined

Execution happens after the creation phase.

7. Arrow Functions Exception
Arrow functions do not have their own:
- this
- arguments object

Instead they inherit these from the closest parent function.

8. The Call Stack
- Structure where execution contexts are stored
- Works using Last In First Out (LIFO) principle

Purpose
- Tracks the order of function execution

9. Call Stack Behavior
When JavaScript starts:
-Global execution context is pushed onto the stack

When a function is called
- New execution context is created
- Pushed onto the call stack

When a function finishes
- Its execution context is removed (popped) from the stack
- Control returns to the previous context

10. Execution Flow Example

Step 1 
- Program starts
- Call stack:
- Global Execution Context

Step 2
- Function is called
Call stack:
- Function Execution Context
- Global Execution Context

Step 3
Another function is called inside
Call stack:
- Second Function Context
- First Function Context
- Global Context

Step 4
Second function returns
Call stack:
- First Function Context
- Global Context

Step 5
First function returns
Call stack:
- Global Context

11. Single Thread Behavior
- JavaScript has one thread
- Only one execution context runs at a time

When a function is called:
- Current function pauses
- New function executes
- Execution continues only after the called function returns.

12. Program End
- Global execution context remains active while program runs

Removed only when:
- Browser tab closes
- Program completely finishes

Key Concepts Summary
Execution Context
- Environment where JavaScript code runs.

Global Execution Context
- Handles top-level code.

Function Execution Context
- Created for every function call.

Call Stack
- Structure that tracks execution order of contexts.

Components of Execution Context
- Variable Environment
- Scope Chain
- this keyword

Arrow Function Difference
- No own this
- No own arguments

SCOPE AND THE SCOPE CHAIN

1. What is Scoping?
Scoping controls how variables are organized and accessed in JavaScript.

It answers two questions:
- Where do variables live?
- Where can variables be accessed?

2. Lexical Scoping
JavaScript uses lexical scoping.

Lexical scoping:
- Variable access depends on where functions and blocks are written in the code.

Example:

function outer() {
  let a = 10;

  function inner() {
    console.log(a);
  }
}

- inner() can access a
- Because inner is written inside outer
- Access is determined by code structure, not execution order.

3. What is Scope?
Scope is the environment where a variable is declared.

For functions:
- Scope is essentially the variable environment inside the execution context

4. Scope of a Variable
The scope of a variable is the entire region of code where that variable can be accessed.

5. Types of Scope in JavaScript
JavaScript has three types of scope:
- Global Scope
- Function Scope
- Block Scope

6. Global Scope
Variables declared outside any function or block.

Example:
const name = "Jonas";

-Characteristics
-Accessible everywhere
-Available in all functions and blocks
-These are called global variables.

7. Function Scope
Every function creates its own scope.

Example:

function calcAge() {
  const now = 2037;
}
Rules

- Variables inside a function are local
- They cannot be accessed outside the function

Example:

function calcAge() {
  const now = 2037;
}

console.log(now); // ReferenceError
8. Block Scope

Introduced in ES6.

Blocks are code inside { }.

Examples:
- if statements
- for loops
- standalone blocks

Example:

if (true) {
  const age = 30;
}
Rules

Variables declared with:
- let
- const
are block scoped.
They only exist inside the block.

9. var vs let / const
var:
- Function scoped
- Ignores blocks

Example:

if (true) {
  var age = 30;
}

console.log(age); // Works
let and const

Block scoped:

Example:

if (true) {
  const age = 30;
}

console.log(age); // Error
10. Functions and Scope

All function types create scope:
- Function declarations
- Function expressions
- Arrow functions

Example:

function a() {}
const b = function() {};
const c = () => {};

Each creates its own scope.

11. The Scope Chain
Every scope has access to variables from all outer (parent) scopes.
This connection between scopes is called the scope chain.

12. How Variable Lookup Works
When JavaScript tries to access a variable:

- Check current scope
- If not found → check parent scope
- Continue up the chain
- Stop at global scope

If the variable still isn't found → ReferenceError
This process is called variable lookup.

13. Scope Chain Example

const myName = "Jonas";

function first() {
  const age = 30;

  function second() {
    const job = "teacher";
    console.log(myName, age, job);
  }

  second();
}

Scope structure:

Global Scope
   ↓
first() Scope
   ↓
second() Scope

second() can access:

job (local)

age (parent scope)

myName (global scope)

14. Scope Chain Rule
Scopes can access:
- Their own variables
- Variables in outer scopes
- Scopes cannot access inner scopes.

Example:

Global
   ↓
Function A
   ↓
Function B

Function A cannot access variables in Function B.

Scope lookup works upwards only.

15. Block Scope Example
function first() {

  const age = 30;

  if (age >= 30) {
    const decade = 3;
    var millennial = true;
  }

}
Result

- decade
- Block scoped

Only inside if
- millennial

Declared with var
- Belongs to function scope

16. Sibling Scopes
Scopes that are not nested inside each other cannot access each other's variables.

Example structure:

Function A
   ├── Block 1
   └── Function B

Block 1 and Function B cannot access each other's variables.

They are siblings.

17. Global Variables
Variables declared in global scope:
- Are available everywhere
- Always at the top of the scope chain

Example:

const appName = "MyApp";

Accessible from any function.

18. Scope Chain vs Call Stack
These are different concepts.

Call Stack
- Tracks function execution order.

Example:

third()
second()
first()
global()
Scope Chain

Tracks variable accessibility based on code structure.
Determined by where functions are written, not by execution order.

19. Important Rule

Scope chain depends on:

✔ Where functions are written
❌ Not where functions are called

20. Example Showing the Difference
function first() {
  function second() {
    third();
  }
}

function third() {
  console.log(a);
}

Even if second() calls third():

third() cannot access variables inside second()

Because it was not written inside it.

21. Key Concepts Summary
Scoping:
Determines where variables live and can be accessed.

Types of Scope
- Scope Type	Description
- Global Scope	Variables accessible everywhere
- Function Scope	Variables inside functions
- Block Scope	Variables inside {} blocks
- Block Scope Variables
- Keyword	Scope
- let	Block
- const	Block
- var	Function
- Scope Chain

Scopes can access outer scopes
Variable lookup moves upwards
Inner scopes are not accessible

Important Rule
Scope chain depends on lexical structure of the code, not function call order.
